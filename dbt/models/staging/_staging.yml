version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [not_null]
  - name: stg_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: stg_order_lines
    columns:
      - name: order_line_id
        tests: [unique, not_null]
  - name: stg_products
    columns:
      - name: product_id
        tests: [unique, not_null]
  - name: stg_stores
    columns:
      - name: store_id
        tests: [unique, not_null]
